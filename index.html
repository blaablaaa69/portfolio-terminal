<script>

// 2. CSV FETCH FUNCTION
async function fetchPricesViaCSV() {
  const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQfm6A67NJe2QoohNNNnjww5-n7TLCOGl7-_r08dPN0YzsT6b9SjcOvWfjjwDZTdG6kZikt4c7kfcy0/pub?gid=809910139&single=true&output=csv'; // <--- PUT URL IN QUOTES
  try {
    const response = await fetch(csvUrl);
    const csvText = await response.text();
    const rows = csvText.split('\n');
    let loaded = 0;
    
    // We start at 1 to skip the header row
    for (let i = 1; i < rows.length; i++) {
      const cols = rows[i].split(',');
      if (cols.length < 2) continue;
      
      const ticker = cols[0].trim();
      const price = parseFloat(cols[3]); // Column B index 3
      
      if (ticker && !isNaN(price)) {
        quotes[ticker] = { price: price, prevClose: price, chg: 0, chgPct: 0 };
        loaded++;
      }
    }
    return loaded;
  } catch (e) {
    console.error("CSV Error:", e);
    return 0;
  }
}

// 3. UPDATED REFRESH FUNCTION
async function doRefresh() {
  if (busy) return;
  busy = true;

  document.getElementById('loading-overlay').classList.remove('hidden');
  const oldPrices = {};
  rows.forEach(r => { oldPrices[r.ticker] = r.price; });

  // CALL THE CSV FUNCTION, NOT THE AI ONE
  let loaded = await fetchPricesViaCSV();
  
  document.getElementById('st-stocks').innerHTML = `<span class="st-ok">Loaded: ${loaded} holdings</span>`;
  document.getElementById('st-crypto').innerHTML = `<span class="st-ok">Source: Google Sheets</span>`;
  document.getElementById('loading-overlay').classList.add('hidden');

  buildRows(oldPrices);
  renderAll();
  busy = false;
}

// ... (Keep all your other functions: buildRows, renderAll, renderSummary, etc.) ...
doRefresh();
</script>
